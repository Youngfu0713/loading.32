<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進度追蹤管理面板</title>
    <style>
        /* 引入你的 Miao.ttf 字體 */
        @font-face {
            font-family: 'MiaoFont';
            src: url('Miao.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --video-color: #e74c3c;
            --book-color: #2ecc71;
            --border-color: #e2e8f0;
        }

        body {
            /* 優先套用苗字體，若讀取不到則使用系統預設細黑體 */
            font-family: 'MiaoFont', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        /* 左右兩大區塊獨立分開 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .section-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            min-height: 400px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #cbd5e1;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
            font-family: 'MiaoFont', sans-serif;
            transition: opacity 0.2s;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        .video-theme .add-btn { background-color: var(--video-color); }
        .book-theme .add-btn { background-color: var(--book-color); }

        /* 卡片列表 */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            padding: 20px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 圖片自適應設定 */
        .image-container {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            background: #eaeaea;
            display: none;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain; /* 保持原圖比例完美縮放 */
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-right: 25px;
            outline: none;
            border-bottom: 1px dashed transparent;
        }

        .card-title:focus {
            border-bottom-color: #94a3b8;
        }

        /* 進度條外殼 */
        .progress-container {
            background-color: #e2e8f0;
            border-radius: 10px;
            height: 14px;
            width: 100%;
            overflow: hidden;
            margin: 15px 0 8px 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .video-theme .progress-bar { background-color: var(--video-color); }
        .book-theme .progress-bar { background-color: var(--book-color); }

        .progress-text {
            font-size: 0.95rem;
            color: #475569;
            display: flex;
            justify-content: space-between;
        }

        /* 輸入表單 */
        .inputs-group {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 4px;
        }

        input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: 'MiaoFont', sans-serif;
        }

        .file-input-label {
            grid-column: span 2;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .file-input-label:hover {
            background: #f1f5f9;
        }

        .file-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>📊 進度管理控制面板</h1>

        <div class="dashboard-grid">
            
            <!-- 🎬 影片獨立區塊 -->
            <div class="section-box video-theme">
                <div class="section-header">
                    <div class="section-title">🎬 影片進度</div>
                    <button class="add-btn" onclick="addItem('video')">＋ 新增影片</button>
                </div>
                <div id="video-list" class="cards-list"></div>
            </div>

            <!-- 📖 書籍獨立區塊 -->
            <div class="section-box book-theme">
                <div class="section-header">
                    <div class="section-title">📖 書籍進度</div>
                    <button class="add-btn" onclick="addItem('book')">＋ 新增書籍</button>
                </div>
                <div id="book-list" class="cards-list"></div>
            </div>

        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('split-progress-items')) || [];

        // 時間轉秒數核心 (處理 hh:mm)
        function timeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.trim().split(':').map(Number);
            if (parts.some(isNaN)) return 0;
            
            if (parts.length === 2) {
                return (parts[0] * 3600) + (parts[1] * 60);
            } else if (parts.length === 3) {
                return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            } else if (parts.length === 1) {
                return parts[0] * 3600;
            }
            return 0;
        }

        function formatTimeString(timeStr) {
            if (!timeStr) return '00:00';
            return timeStr.trim();
        }

        function addItem(type) {
            const newItem = {
                id: Date.now().toString(),
                type: type,
                title: type === 'video' ? '新影片名稱 (點擊直接修改)' : '新書本名稱 (點擊直接修改)',
                image: '',
                current: type === 'video' ? '03:20' : '0',
                total: type === 'video' ? '12:00' : '100'
            };
            items.push(newItem);
            saveAndRender();
        }

        function deleteItem(id) {
            if(confirm('確定要刪除此進度項目嗎？')) {
                items = items.filter(item => item.id !== id);
                saveAndRender();
            }
        }

        function updateItem(id, field, value) {
            const item = items.find(item => item.id === id);
            if (item) {
                item[field] = value;
                saveAndRender();
            }
        }

        function handleImageUpload(event, id) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                updateItem(id, 'image', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function saveAndRender() {
            localStorage.setItem('split-progress-items', JSON.stringify(items));
            renderDOM();
        }

        function renderDOM() {
            const videoList = document.getElementById('video-list');
            const bookList = document.getElementById('book-list');
            
            videoList.innerHTML = '';
            bookList.innerHTML = '';

            items.forEach(item => {
                let percent = 0;
                let progressTextLeft = '';
                let progressTextRight = '';

                if (item.type === 'video') {
                    const currentSec = timeToSeconds(item.current);
                    const totalSec = timeToSeconds(item.total);
                    percent = totalSec > 0 ? (currentSec / totalSec) * 100 : 0;
                    percent = Math.min(Math.max(percent, 0), 100);
                    
                    progressTextLeft = `已看: ${formatTimeString(item.current)}`;
                    progressTextRight = `總長: ${formatTimeString(item.total)}`;
                } else {
                    const currentPages = parseFloat(item.current) || 0;
                    const totalPages = parseFloat(item.total) || 0;
                    percent = totalPages > 0 ? (currentPages / totalPages) * 100 : 0;
                    percent = Math.min(Math.max(percent, 0), 100);

                    progressTextLeft = `已讀: ${currentPages} 頁`;
                    progressTextRight = `總共: ${totalPages} 頁`;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>
                    
                    <div class="image-container" style="display: ${item.image ? 'block' : 'none'}">
                        <img src="${item.image || ''}" alt="Cover">
                    </div>

                    <div class="card-title" contenteditable="true" onblur="updateItem('${item.id}', 'title', this.innerText)">${item.title}</div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${percent}%"></div>
                    </div>
                    
                    <div class="progress-text">
                        <span>${progressTextLeft}</span>
                        <strong>${percent.toFixed(1)}%</strong>
                        <span>${progressTextRight}</span>
                    </div>

                    <div class="inputs-group">
                        <div class="input-field">
                            <label>${item.type === 'video' ? '目前時間 (如 03:20)' : '目前頁數'}</label>
                            <input type="text" value="${item.current}" onchange="updateItem('${item.id}', 'current', this.value)">
                        </div>
                        <div class="input-field">
                            <label>${item.type === 'video' ? '總長度 (如 12:00)' : '總頁數'}</label>
                            <input type="text" value="${item.total}" onchange="updateItem('${item.id}', 'total', this.value)">
                        </div>
                        <label class="file-input-label">
                            📷 插入自適應圖片
                            <input type="file" class="file-input" accept="image/*" onchange="handleImageUpload(event, '${item.id}')">
                        </label>
                    </div>
                `;

                if (item.type === 'video') {
                    videoList.appendChild(card);
                } else {
                    bookList.appendChild(card);
                }
            });
        }

        // 初次加載頁面渲染
        renderDOM();
    </script>
</body>
</html>
