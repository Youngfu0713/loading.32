<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人學習與娛樂進度追蹤器</title>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --border-color: #e1e4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 圖片容器：自適應大小的核心 */
        .image-container {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            background: #eaeaea;
            display: none; /* 預設隱藏，有圖片才顯示 */
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain; /* 保持原圖比例自適應 */
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            outline: none;
        }

        /* 進度條樣式 */
        .progress-container {
            background-color: #e9ecef;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin: 15px 0 8px 0;
        }

        .progress-bar {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* 輸入區塊樣式 */
        .inputs-group {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }

        input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .file-input-label {
            grid-column: span 2;
            background: #f1f3f5;
            border: 1px dashed #ced4da;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .file-input-label:hover {
            background: #e2e6ea;
        }

        .file-input {
            display: none;
        }

        /* 控制面板 */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .add-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #2ecc71;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 影音與書籍進度管理面板</h1>

        <div class="controls">
            <button class="add-btn" onclick="addItem('video')">🎬 新增影音項目</button>
            <button class="add-btn" style="background-color: #9b59b6;" onclick="addItem('book')">📖 新增書籍項目</button>
        </div>

        <div class="section-title">🎬 影片進度追蹤</div>
        <div id="video-grid" class="grid"></div>

        <div class="section-title">📖 書籍進度追蹤</div>
        <div id="book-grid" class="grid"></div>
    </div>

    <script>
        // 初始化資料來源 (從 LocalStorage 讀取)
        let items = JSON.parse(localStorage.getItem('progress-items')) || [];

        // 時間轉換核心邏輯：將 "12:00"、"12:30:15" 或 "12" 統一轉換為秒數
        function timeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.trim().split(':').map(Number);
            if (parts.some(isNaN)) return 0;
            
            if (parts.length === 3) {
                // hh:mm:ss
                return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            } else if (parts.length === 2) {
                // hh:mm 或 mm:ss (這邊依題目假設 12:00 代表 12小時00分)
                return (parts[0] * 3600) + (parts[1] * 60);
            } else if (parts.length === 1) {
                // 純數字當作小時處理
                return parts[0] * 3600;
            }
            return 0;
        }

        // 格式化輸出時間文字
        function formatTimeString(timeStr) {
            if (!timeStr) return '00:00';
            return timeStr.trim();
        }

        // 新增項目
        function addItem(type) {
            const newItem = {
                id: Date.now().toString(),
                type: type,
                title: type === 'video' ? '新影片名稱 (點擊編輯)' : '新書本名稱 (點擊編輯)',
                image: '',
                current: type === 'video' ? '03:20' : '0',
                total: type === 'video' ? '12:00' : '100'
            };
            items.push(newItem);
            saveAndRender();
        }

        // 刪除項目
        function deleteItem(id) {
            if(confirm('確定要刪除此項目嗎？')) {
                items = items.filter(item => item.id !== id);
                saveAndRender();
            }
        }

        // 更新欄位內容
        function updateItem(id, field, value) {
            const item = items.find(item => item.id === id);
            if (item) {
                item[field] = value;
                saveAndRender();
            }
        }

        // 處理圖片上傳 (轉為 Base64 儲存於 LocalStorage)
        function handleImageUpload(event, id) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                updateItem(id, 'image', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 儲存並渲染畫面
        function saveAndRender() {
            localStorage.setItem('progress-items', JSON.stringify(items));
            renderDOM();
        }

        // 渲染主功能
        function renderDOM() {
            const videoGrid = document.getElementById('video-grid');
            const bookGrid = document.getElementById('book-grid');
            
            videoGrid.innerHTML = '';
            bookGrid.innerHTML = '';

            items.forEach(item => {
                let percent = 0;
                let progressTextLeft = '';
                let progressTextRight = '';

                // 計算進度百分比與顯示文本
                if (item.type === 'video') {
                    const currentSec = timeToSeconds(item.current);
                    const totalSec = timeToSeconds(item.total);
                    percent = totalSec > 0 ? (currentSec / totalSec) * 100 : 0;
                    percent = Math.min(Math.max(percent, 0), 100); // 限制在 0-100 之間
                    
                    progressTextLeft = `已看: ${formatTimeString(item.current)}`;
                    progressTextRight = `總長: ${formatTimeString(item.total)}`;
                } else {
                    const currentPages = parseFloat(item.current) || 0;
                    const totalPages = parseFloat(item.total) || 0;
                    percent = totalPages > 0 ? (currentPages / totalPages) * 100 : 0;
                    percent = Math.min(Math.max(percent, 0), 100);

                    progressTextLeft = `已讀: ${currentPages} 頁`;
                    progressTextRight = `總共: ${totalPages} 頁`;
                }

                // 建立卡片 HTML
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>
                    
                    <div class="image-container" style="display: ${item.image ? 'block' : 'none'}">
                        <img src="${item.image || ''}" alt="Cover">
                    </div>

                    <div class="card-title" contenteditable="true" onblur="updateItem('${item.id}', 'title', this.innerText)">${item.title}</div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${percent}%"></div>
                    </div>
                    
                    <div class="progress-text">
                        <span>${progressTextLeft}</span>
                        <strong>${percent.toFixed(1)}%</strong>
                        <span>${progressTextRight}</span>
                    </div>

                    <div class="inputs-group">
                        <div class="input-field">
                            <label>${item.type === 'video' ? '目前時間 (如 03:20)' : '目前頁數'}</label>
                            <input type="text" value="${item.current}" onchange="updateItem('${item.id}', 'current', this.value)">
                        </div>
                        <div class="input-field">
                            <label>${item.type === 'video' ? '總長度 (如 12:00)' : '總頁數'}</label>
                            <input type="text" value="${item.total}" onchange="updateItem('${item.id}', 'total', this.value)">
                        </div>
                        <label class="file-input-label">
                            📷 上傳/更換自適應封面
                            <input type="file" class="file-input" accept="image/*" onchange="handleImageUpload(event, '${item.id}')">
                        </label>
                    </div>
                `;

                if (item.type === 'video') {
                    videoGrid.appendChild(card);
                } else {
                    bookGrid.appendChild(card);
                }
            });
        }

        // 網頁開啟時第一次渲染
        renderDOM();
    </script>
</body>
</html>
